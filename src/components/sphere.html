<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Morphing Sphere</title>
<style>*{margin:0;padding:0;}body{background:#fff;overflow:hidden;}</style></head><body>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const scene=new THREE.Scene();scene.background=new THREE.Color(0xffffff);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
camera.position.set(0,0,50);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);

const geo=new THREE.IcosahedronGeometry(18,5);
const origPos=Float32Array.from(geo.attributes.position.array);
const mat=new THREE.MeshBasicMaterial({color:0x000000,wireframe:true,transparent:true,opacity:.1});
const mesh=new THREE.Mesh(geo,mat);scene.add(mesh);
const mat2=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.04,side:THREE.BackSide});
scene.add(new THREE.Mesh(geo,mat2));

let t=0;
function animate(){requestAnimationFrame(animate);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=origPos[i*3],y=origPos[i*3+1],z=origPos[i*3+2];
    const noise=Math.sin(x*.2+t)*Math.cos(y*.2+t*.7)*Math.sin(z*.2+t*.5)*3;
    const len=Math.sqrt(x*x+y*y+z*z);
    const nl=len+noise;
    pos.setXYZ(i,x/len*nl,y/len*nl,z/len*nl);
  }
  pos.needsUpdate=true;geo.computeVertexNormals();
  mesh.rotation.y=t*.2;mesh.rotation.x=t*.1;
  t+=0.015;renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
