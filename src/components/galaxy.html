<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Galaxy Spiral</title>
<style>*{margin:0;padding:0;}body{background:#04050a;overflow:hidden;}</style></head><body>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x04050a);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
camera.position.set(0,30,60);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);

const N=8000,arms=3;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(N*3),col=new Float32Array(N*3);
for(let i=0;i<N;i++){
  const arm=i%arms;
  const t=Math.random();const r=t*40+2;
  const spin=r*.3,offset=arm*(Math.PI*2/arms);
  const a=offset+spin+Math.random()*.5;
  const spread=Math.random()*.5+Math.random()*.5;
  pos[i*3]=Math.cos(a)*r+(Math.random()-.5)*spread*3;
  pos[i*3+1]=(Math.random()-.5)*1.5;
  pos[i*3+2]=Math.sin(a)*r+(Math.random()-.5)*spread*3;
  col[i*3]=0.9+t*.1;col[i*3+1]=0.9+t*.05;col[i*3+2]=1;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
const mat=new THREE.PointsMaterial({size:.4,vertexColors:true,transparent:true,opacity:.8});
scene.add(new THREE.Points(geo,mat));

let t=0;
function animate(){requestAnimationFrame(animate);t+=0.003;
  camera.position.x=Math.sin(t)*70;camera.position.z=Math.cos(t)*70;camera.lookAt(0,0,0);
  renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
